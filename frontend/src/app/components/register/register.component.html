
<div class="register-container">
    <form (ngSubmit)="register()"> 
        <h2 style="text-align: center;">Đăng Ký</h2>
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" [(ngModel)]="name" name="name" class="form-control" placeholder="Enter your name">
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" [(ngModel)]="email" class="form-control" placeholder="Enter your email">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" [(ngModel)]="password" name="password" class="form-control" placeholder="Enter your password">
      </div>
       <div class="form-group">  
        <label for="confirmPassword">Phone</label>
        <input type="text" id="phone" name="phone" [(ngModel)]="phone" class="form-control" placeholder="Enter your phone">
      </div> 
      <button type="submit" class="btn btn-primary" >Register</button>
    </form>
  </div>
